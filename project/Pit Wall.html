<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Apex GP · Pit Wall</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&family=Geist:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0B0B11;
    --bg-2: #15151E;
    --red: #FF1E00;
    --text: #E6E6EF;
    --muted: rgba(180,180,200,0.6);
  }
  * { box-sizing: border-box; }
  html, body, #root { height: 100%; width: 100%; margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: "Geist", "Inter", system-ui, sans-serif; overflow: hidden; }
  body { background:
    radial-gradient(ellipse at 20% 10%, rgba(255,30,0,0.08), transparent 55%),
    radial-gradient(ellipse at 80% 90%, rgba(0,217,255,0.05), transparent 50%),
    var(--bg);
  }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,30,0,0.3); }
  @keyframes apexpulse {
    0% { transform: scale(1); opacity: 0.5; }
    100% { transform: scale(2.2); opacity: 0; }
  }
  @keyframes scan {
    0% { transform: translateY(-100%); }
    100% { transform: translateY(100%); }
  }
  @keyframes apex-panel-in {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes apex-row-pulse {
    0%   { background-color: rgba(255,30,0,0.22); }
    100% { background-color: rgba(255,30,0,0); }
  }
  @keyframes apex-flag-glow-yellow {
    0%, 100% { box-shadow: inset 0 0 0 1px rgba(255,184,0,0.55), inset 0 0 40px rgba(255,184,0,0.12); }
    50%      { box-shadow: inset 0 0 0 1px rgba(255,184,0,0.8),  inset 0 0 60px rgba(255,184,0,0.22); }
  }
  @keyframes apex-flag-glow-red {
    0%, 100% { box-shadow: inset 0 0 0 2px rgba(255,30,0,0.7),  inset 0 0 50px rgba(255,30,0,0.18); }
    50%      { box-shadow: inset 0 0 0 2px rgba(255,30,0,0.95), inset 0 0 80px rgba(255,30,0,0.32); }
  }
  .scanline::after {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background: linear-gradient(180deg, transparent, rgba(255,30,0,0.06) 50%, transparent);
    animation: scan 8s linear infinite;
  }
  .apex-panel-mount { animation: apex-panel-in 120ms ease-out both; }
  .apex-row { transition: background-color 60ms linear, border-color 60ms linear; }
  .apex-row-pulse { animation: apex-row-pulse 450ms ease-out; }
  .apex-flag-layer {
    position: absolute; inset: 0; pointer-events: none; z-index: 2;
    transition: box-shadow 200ms ease;
  }
  .apex-flag-layer.yellow, .apex-flag-layer.sc, .apex-flag-layer.vsc {
    animation: apex-flag-glow-yellow 2.2s ease-in-out infinite;
  }
  .apex-flag-layer.red {
    animation: apex-flag-glow-red 1.1s ease-in-out infinite;
  }
  .apex-sector-bar-fill { transition: width 60ms linear, background-color 120ms ease; }
  button:focus { outline: none; }
  input[type=range] { -webkit-appearance: none; background: rgba(255,255,255,0.06); height: 2px; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 10px; height: 10px; background: #FF1E00; border: 0; cursor: pointer; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>

  <script src="dist/bundle.js"></script>
</body>
</html>
